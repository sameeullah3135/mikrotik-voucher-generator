services:
  - type: web
    name: mikrotik-voucher-api
    runtime: node
    repo: https://github.com/sameeullah3135/mikrotik-voucher-generator
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PORT
        value: 3000
